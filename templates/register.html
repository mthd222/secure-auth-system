<!DOCTYPE html>
<html>
<head>

    <title>Register</title>

    <link rel="stylesheet"
          href="{{ url_for('static',
          filename='css/style.css') }}">

    <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<div class="container">

    <div class="logo">
        🛡️
    </div>

    <h1>Create Account</h1>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <div class="message">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">
        <input type="hidden"
       name="csrf_token"
       value="{{ csrf_token() }}">

        <input type="text"
               name="username"
               placeholder="Username"
               required>

        <input type="email"
               name="email"
               placeholder="Email"
               required>

        <div class="password-container">

    <input type="password"
           id="regpassword"
           name="password"
           placeholder="Password"
           required>

    <i class="fa-solid fa-eye"
       id="toggleRegPassword"
       onclick="togglePassword('regpassword', 'toggleRegPassword')">
    </i>

</div>
        <button type="submit">
            Register
        </button>

    </form>

    <a href="/">
        Back to Login
    </a>

    <div class="footer">
        Cybersecurity Authentication Project
    </div>

</div>

<script src="{{ url_for('static',
filename='js/script.js') }}"></script>

</body>
</html>
