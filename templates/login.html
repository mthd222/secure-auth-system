<!DOCTYPE html>
<html>
<head>

    <title>Secure Login</title>

    <link rel="stylesheet"
          href="{{ url_for('static',
          filename='css/style.css') }}">

    <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<div class="container">

    <div class="logo">
        🔐
    </div>

    <h1>Secure Login</h1>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <div class="message">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form action="/login" method="POST">
        <input type="hidden"
       name="csrf_token"
       value="{{ csrf_token() }}">

        <input type="email"
               name="email"
               placeholder="Enter Email"
               required>

       <div class="password-container">

    <input type="password"
           id="password"
           name="password"
           placeholder="Enter Password"
           required>

    <i class="fa-solid fa-eye"
       id="togglePassword"
       onclick="togglePassword('password', 'togglePassword')">
    </i>

</div>

        <button type="submit">
            Login
        </button>

    </form>

    <a href="/register">
        Create New Account
    </a>

    <div class="footer">
        Secure Authentication System
    </div>

</div>

<script src="{{ url_for('static',
filename='js/script.js') }}"></script>

</body>
</html>
